<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Petitions · AGSB Speaks</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav>
    <span class="nav-logo">AGSB<span>SPEAKS</span></span>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="polls.html">Polls</a></li>
      <li><a href="petitions.html">Petitions</a></li>
      <li><a href="articles.html">Articles</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="login.html" class="nav-cta">Join</a></li>
    </ul>
    <div class="nav-toggle"><span></span><span></span><span></span></div>
  </nav>

  <div class="page-header">
    <h1>Petitions</h1>
    <p>Sign to show the school where students stand. Signature counts are public and updated in real time.</p>
  </div>
    <div style="margin-bottom:1.5rem;">
      <a href="#" class="btn btn-ghost" style="font-size:0.82rem;" id="submit-link">
        Suggest a petition →
      </a>
    </div>
  <div class="section">
    <div id="petitions-list">
      <p style="color:var(--muted);font-size:0.9rem;">Loading petitions...</p>
    </div>
  </div>

  <footer>
    <p>AGSB<span>SPEAKS</span> · Independent · Student-run · All data public · <a href="privacy.html" style="color:var(--muted);">Privacy</a></p>
  </footer>

  <script type="module">
    import { supabase } from './js/supabase.js'

    const container = document.getElementById('petitions-list')

    async function loadPetitions() {
      const { data: petitions, error } = await supabase
        .from('petitions')
        .select('*')
        .order('created_at', { ascending: false })

      if (error) {
        container.innerHTML = '<p style="color:var(--muted)">Failed to load petitions.</p>'
        return
      }

      if (!petitions.length) {
        container.innerHTML = '<p style="color:var(--muted)">No petitions yet — check back soon.</p>'
        return
      }

      const { data: { user } } = await supabase.auth.getUser()
      let userSigs = new Set()
      if (user) {
        const { data: sigs } = await supabase
          .from('petition_signatures')
          .select('petition_id')
          .eq('user_id', user.id)
        if (sigs) sigs.forEach(s => userSigs.add(s.petition_id))
      }

      const { data: countData } = await supabase.rpc('get_user_count')
      const totalUsers = countData || 1

      container.innerHTML = petitions.map(p => renderPetition(p, user, userSigs, totalUsers)).join('')

      petitions.forEach(p => {
        const btn = document.getElementById(`sign-${p.id}`)
        if (btn) btn.addEventListener('click', () => toggleSign(p.id, userSigs.has(p.id)))
      })
    }

    function renderPetition(p, user, userSigs, totalUsers) {
      const signed = userSigs.has(p.id)
      const pct = totalUsers > 0 ? Math.round((p.signature_count / totalUsers) * 100) : 0

      let actionBtn
      if (!user) {
        actionBtn = `<a href="login.html" class="btn btn-primary">Log in to sign</a>`
      } else if (p.closed) {
        actionBtn = `<span style="color:var(--muted);font-size:0.85rem;">This petition is closed</span>`
      } else if (signed) {
        actionBtn = `<button class="btn btn-ghost" id="sign-${p.id}" style="border-color:var(--accent);color:var(--accent);">Signed ✓ — withdraw</button>`
      } else {
        actionBtn = `<button class="btn btn-primary" id="sign-${p.id}">Sign this petition</button>`
      }

      return `
        <div class="petition-card" style="margin-bottom:1rem;">
          <span class="card-tag">${p.closed ? 'Closed' : 'Open'}</span>
          <p class="petition-title">${p.title}</p>
          <p class="petition-desc">${p.description}</p>
          <div class="progress-wrap">
            <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
            <div class="progress-label">
              <span>${p.signature_count.toLocaleString()} signatures</span>
              <span>${pct}% of users</span>
            </div>
          </div>
          <div class="petition-actions">${actionBtn}</div>
        </div>
      `
    }

    async function toggleSign(petitionId, alreadySigned) {
      const { data: { user } } = await supabase.auth.getUser()
      if (!user) { window.location.href = 'login.html'; return }

      if (alreadySigned) {
        await supabase
          .from('petition_signatures')
          .delete()
          .eq('petition_id', petitionId)
          .eq('user_id', user.id)
        await supabase.rpc('decrement_signature', { petition_id: petitionId })
      } else {
        const { error } = await supabase
          .from('petition_signatures')
          .insert({ petition_id: petitionId, user_id: user.id })
        if (!error) {
          await supabase.rpc('increment_signature', { petition_id: petitionId })
        }
      }

      loadPetitions()
    }

    loadPetitions()
  </script>
</body>
</html>
