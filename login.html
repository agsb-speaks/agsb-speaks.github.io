<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join · AGSB Speaks</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">AGSB<span>SPEAKS</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="polls.html">Polls</a></li>
      <li><a href="petitions.html">Petitions</a></li>
      <li><a href="articles.html">Articles</a></li>
    </ul>
    <div class="nav-toggle"><span></span><span></span><span></span></div>
  </nav>

  <div class="auth-wrap">
    <div class="auth-box">
      <p class="auth-title">AGSB<span style="color:var(--accent)">SPEAKS</span></p>
      <p class="auth-sub">One account. All polls, petitions, and articles.</p>

      <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login">Log in</button>
      <button class="auth-tab" id="tab-signup">Sign up</button>
    </div>

      <!-- login form -->
      <div id="form-login">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" type="email" id="login-email (personal pls- preferably not your school email)" placeholder="your@email.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <button class="btn btn-primary form-submit" id="btn-login">Log in</button>
        <p class="form-footer">No account? <a href="#" id="go-signup">Sign up</a></p>
      </div>

      <!-- signup form -->
      <div id="form-signup" style="display:none;">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" type="email" id="signup-email" placeholder="your@email.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label class="form-label">Year group</label>
          <select class="form-select" id="signup-year">
            <option value="" disabled selected>Select your year</option>
            <option value="7">Year 7</option>
            <option value="8">Year 8</option>
            <option value="9">Year 9</option>
            <option value="10">Year 10</option>
            <option value="11">Year 11</option>
            <option value="12">Year 12</option>
            <option value="13">Year 13</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" type="password" id="signup-password" placeholder="min. 8 characters" autocomplete="new-password" />
        </div>
        <div class="form-group">
          <label class="form-label">Confirm password</label>
          <input class="form-input" type="password" id="signup-confirm" placeholder="••••••••" autocomplete="new-password" />
        </div>
        <button class="btn btn-primary form-submit" id="btn-signup">Create account</button>
        <div style="background:var(--bg);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:var(--radius);padding:0.85rem 1rem;margin-top:1rem;">
          <p style="font-size:0.78rem;line-height:1.6;color:var(--muted);margin:0;">
            <strong style="color:var(--text);">Your email stays private.</strong> It is used only to prevent duplicate accounts and is never visible to anyone. <a href="privacy.html" style="color:var(--accent);font-weight:600;">Read more →</a>
          </p>
        </div>
        <p class="form-footer">Already have an account? <a href="#" id="go-login">Log in</a></p>
      </div>

    </div>
  </div>
<script type="module" src="js/main.js"></script>
<script type="module">
    import { supabase } from './js/supabase.js'

    function showToast(msg, type = 'default') {
      let container = document.querySelector('.toast-container')
      if (!container) {
        container = document.createElement('div')
        container.className = 'toast-container'
        document.body.appendChild(container)
      }
      const toast = document.createElement('div')
      toast.className = 'toast' + (type === 'error' ? ' error' : '')
      toast.textContent = msg
      container.appendChild(toast)
      setTimeout(() => toast.remove(), 3200)
    }

    function switchTab(tab) {
      document.getElementById('form-login').style.display  = tab === 'login'  ? 'block' : 'none'
      document.getElementById('form-signup').style.display = tab === 'signup' ? 'block' : 'none'
      document.getElementById('tab-login').classList.toggle('active',  tab === 'login')
      document.getElementById('tab-signup').classList.toggle('active', tab === 'signup')
    }

    async function handleLogin() {
      const email = document.getElementById('login-email').value.trim()
      const pass  = document.getElementById('login-password').value
      if (!email || !pass) { showToast('Fill in all fields', 'error'); return }
      const { error } = await supabase.auth.signInWithPassword({ email, password: pass })
      if (error) { showToast(error.message, 'error'); return }
      window.location.href = 'index.html'
    }

    async function handleSignup() {
      const email   = document.getElementById('signup-email').value.trim()
      const year    = document.getElementById('signup-year').value
      const pass    = document.getElementById('signup-password').value
      const confirm = document.getElementById('signup-confirm').value
      if (!email || !year || !pass || !confirm) { showToast('Fill in all fields', 'error'); return }
      if (pass !== confirm) { showToast('Passwords do not match', 'error'); return }
      if (pass.length < 8) { showToast('Password must be at least 8 characters', 'error'); return }
      const { data, error } = await supabase.auth.signUp({ email, password: pass })
      if (error) { showToast(error.message, 'error'); return }
      await supabase.from('profiles').insert({ id: data.user.id, year_group: parseInt(year) })
      showToast('Account created! Check your email to confirm.')
    }

    document.getElementById('tab-login').addEventListener('click', () => switchTab('login'))
    document.getElementById('tab-signup').addEventListener('click', () => switchTab('signup'))
    document.getElementById('go-signup').addEventListener('click', (e) => { e.preventDefault(); switchTab('signup') })
    document.getElementById('go-login').addEventListener('click', (e) => { e.preventDefault(); switchTab('login') })
    document.getElementById('btn-login').addEventListener('click', handleLogin)
    document.getElementById('btn-signup').addEventListener('click', handleSignup)
</script>
</body>
</html>
