<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Polls · AGSB Speaks</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav>
    <span class="nav-logo">AGSB<span>SPEAKS</span></span>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="polls.html">Polls</a></li>
      <li><a href="petitions.html">Petitions</a></li>
      <li><a href="articles.html">Articles</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="login.html" class="nav-cta">Join</a></li>
    </ul>
    <div class="nav-toggle"><span></span><span></span><span></span></div>
  </nav>

  <div class="page-header">
    <h1>Polls</h1>
    <p>Results are visible to everyone. Log in to cast your vote — one vote per student.</p>
  </div>
      <div style="margin-bottom:1.5rem;">
      <a href="#" class="btn btn-ghost" style="font-size:0.82rem;" id="submit-link">
        Suggest a poll →
      </a>
    </div>

  <div class="section">
    <div id="polls-list">
      <p style="color:var(--muted);font-size:0.9rem;">Loading polls...</p>
    </div>
  </div>

  <footer>
    <p>AGSB<span>SPEAKS</span> · Independent · Student-run · All data public</p>
  </footer>

  <script type="module">
    import { supabase } from './js/supabase.js'

    const container = document.getElementById('polls-list')

    async function loadPolls() {
      const { data: polls, error } = await supabase
        .from('polls')
        .select('*')
        .order('created_at', { ascending: false })

      if (error) {
        container.innerHTML = '<p style="color:var(--muted)">Failed to load polls.</p>'
        return
      }

      if (!polls.length) {
        container.innerHTML = '<p style="color:var(--muted)">No polls yet — check back soon.</p>'
        return
      }

      const { data: { user } } = await supabase.auth.getUser()
      let userVotes = {}
      if (user) {
        const { data: votes } = await supabase
          .from('poll_votes')
          .select('poll_id, option_index')
          .eq('user_id', user.id)
        if (votes) votes.forEach(v => { userVotes[v.poll_id] = v.option_index })
      }

      container.innerHTML = polls.map(poll => renderPoll(poll, user, userVotes)).join('')

      polls.forEach(poll => {
        if (!user) return
        poll.options.forEach((_, i) => {
          const btn = document.getElementById(`vote-${poll.id}-${i}`)
          if (btn) btn.addEventListener('click', () => castVote(poll.id, i))
        })
      })
    }

    function renderPoll(poll, user, userVotes) {
      const totalVotes = poll.votes.reduce((a, b) => a + b, 0)
      const hasVoted = userVotes[poll.id] !== undefined
      const userChoice = userVotes[poll.id]

      const options = poll.options.map((opt, i) => {
        const count = poll.votes[i] || 0
        const pct = totalVotes > 0 ? Math.round((count / totalVotes) * 100) : 0
        const isChosen = hasVoted && userChoice === i
        const showResults = hasVoted || !user

        return `
          <div class="poll-option${isChosen ? ' chosen' : ''}"
               style="cursor:${user ? 'pointer' : 'default'};"
               id="vote-${poll.id}-${i}">
            <div class="poll-option-fill" style="width:${showResults ? pct : 0}%"></div>
            <span class="poll-option-label">${opt}${isChosen ? ' ✓' : ''}</span>
            <span class="poll-option-pct">${showResults ? pct + '%' : ''}</span>
          </div>
        `
      }).join('')

      let footer
      if (!user) {
        footer = `<span>${totalVotes} vote${totalVotes !== 1 ? 's' : ''}</span><a href="login.html" class="btn btn-primary" style="padding:0.35rem 0.9rem;font-size:0.78rem;">Log in to vote</a>`
      } else if (hasVoted) {
        footer = `<span>${totalVotes} vote${totalVotes !== 1 ? 's' : ''}</span><span style="color:var(--accent);font-size:0.78rem;">Vote recorded ✓</span>`
      } else {
        footer = `<span>${totalVotes} vote${totalVotes !== 1 ? 's' : ''}</span><span style="color:var(--muted);font-size:0.78rem;">Click an option to vote</span>`
      }

      return `
        <div class="poll-card" style="margin-bottom:1rem;">
          <p class="card-tag" style="margin-bottom:0.75rem;">${poll.closed ? 'Closed' : 'Active'}</p>
          <p class="poll-question">${poll.question}</p>
          <div class="poll-options">${options}</div>
          <div class="poll-footer">${footer}</div>
        </div>
      `
    }

async function castVote(pollId, optionIndex) {
      const { data: { user } } = await supabase.auth.getUser()
      if (!user) { window.location.href = 'login.html'; return }

      const { data: existing } = await supabase
        .from('poll_votes')
        .select('id, option_index')
        .eq('poll_id', pollId)
        .eq('user_id', user.id)
        .maybeSingle()

      if (existing) {
        if (existing.option_index === optionIndex) return
        await supabase.rpc('decrement_vote', { poll_id: pollId, option_idx: existing.option_index })
        await supabase.rpc('increment_vote', { poll_id: pollId, option_idx: optionIndex })
        await supabase.from('poll_votes').update({ option_index: optionIndex }).eq('id', existing.id)
      } else {
        await supabase.rpc('increment_vote', { poll_id: pollId, option_idx: optionIndex })
        await supabase.from('poll_votes').insert({ poll_id: pollId, user_id: user.id, option_index: optionIndex })
      }

      loadPolls()
    }

    loadPolls()
  </script>
</body>
</html>
